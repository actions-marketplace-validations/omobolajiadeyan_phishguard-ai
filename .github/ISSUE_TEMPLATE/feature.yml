name: Detection improvement
description: Propose an explainable feature or accuracy improvement
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    attributes:
      label: Problem
      description: Describe the false positive, false negative, or missing capability.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed approach
      description: Explain the feature, weight, data, or test cases you would add.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Verification
      description: List positive and negative examples that should be tested.
    validations:
      required: true
